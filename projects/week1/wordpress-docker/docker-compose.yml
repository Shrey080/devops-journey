services:

  db:
    image: mysql:8.0
    container_name: wordpress_db
    restart: always
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress_net

  wordpress:
    image: wordpress:latest
    container_name: wordpress_app
    restart: always
    ports:
      - "8080:80"
    env_file: .env
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - db
    networks:
      - wordpress_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wordpress_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    networks:
      - wordpress_net

volumes:
  db_data:
  wp_data:

networks:
  wordpress_net:
